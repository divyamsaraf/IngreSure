name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    # CI has no Ollama server; disable the LLM so every step uses the
    # deterministic fallbacks instead of retrying localhost:11434 (which
    # only produced connection-refused log noise and slow timeouts).
    env:
      LLM_ENABLED: "false"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check secrets hygiene (no SERVICE_ROLE / NEXT_PUBLIC_*SECRET* in frontend/)
        run: python scripts/check_secrets_hygiene.py
      - name: Verify E-number catalog
        run: python scripts/verify_e_number_catalog.py --fail-on-error
      - name: Check E-number artifact drift
        run: |
          # Upgrade fields in memory only; never rewrite e_number_catalog.json in CI.
          python scripts/generate_ike2_e_numbers.py
          git diff --exit-code core/knowledge/ike2/truth_anchor_e_numbers.json ../data/layer1_e_numbers.json
          # Catalog must stay untouched by the generator default path.
          git diff --exit-code -- ../data/e_number_catalog.json
      - name: Check label corpus drift
        run: python scripts/generate_label_corpus.py --check
      - name: False-Safe shadow gate (label corpus; fails on any false-Safe or match-rate drop)
        run: python scripts/ike2_label_corpus_shadow.py --fail-below-threshold
      - name: Must-never-Safe gate
        run: python -m pytest tests/ike2/test_must_never_be_safe.py tests/ike2/test_golden_safety_budget.py -q
      - name: Commodity coverage promote + USDA head gate
        run: |
          python scripts/ensure_commodity_coverage.py
          # Report JSON has a run timestamp; ontology + seed lists are the contract.
          git diff --exit-code -- ../data/ontology.json ../data/commodity_seed_lists/
      - name: Run tests
        run: python -m pytest tests/ -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test -- --run
      - name: Build
        run: npm run build
