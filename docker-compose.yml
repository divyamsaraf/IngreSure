# IngreSure Docker stack: single project name "ingresure"
# For faster builds: DOCKER_BUILDKIT=1 docker compose build
#
# Default: backend + frontend (no Redis/Celery — lighter for small VMs and demos).
# Optional cache tier: docker compose --profile cache up -d
# OCI / API-only: docker compose up -d backend
#
name: ingresure

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ingresure-backend
    ports:
      - "8000:8000"
    env_file:
      - path: ./backend/.env.compose
      - path: ./backend/.env
        required: false
    environment:
      - RUNNING_IN_DOCKER=1
    volumes:
      - ./backend:/app
      - ./data:/app/../data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=10); c=r.getcode(); r.read(); r.close(); exit(0 if c==200 else 1)"]
      interval: 20s
      timeout: 15s
      retries: 6
      start_period: 300s

  redis:
    image: redis:7.4-alpine
    container_name: ingresure-redis
    profiles:
      - cache
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ingresure-worker
    profiles:
      - cache
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: ./backend/.env.compose
      - path: ./backend/.env
        required: false
    environment:
      - RUNNING_IN_DOCKER=1
    command: ["celery", "-A", "worker.celery_app:celery_app", "worker", "--loglevel=info"]
    volumes:
      - ./backend:/app
      - ./data:/app/../data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ingresure-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    environment:
      - BACKEND_URL=http://backend:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/', r=>{r.resume();process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# Supabase: run separately (supabase start). Backend uses host.docker.internal or public URL when configured.
